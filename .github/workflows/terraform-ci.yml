name: Terraform CI

on:
  pull_request:
    branches: [main]
    paths:
      - "v3-kubernetes/terraform/**"
      - ".github/workflows/terraform-ci.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: terraform-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # =============================================================================
  # Prod 비용 분석
  # =============================================================================
  cost-prod:
    name: Infracost (prod)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Cost breakdown
        run: |
          infracost breakdown \
            --path=v3-kubernetes/terraform/environments/prod \
            --format=json \
            --out-file=/tmp/infracost.json

      - name: Notify Discord
        if: always()
        env:
          WEBHOOK: ${{ secrets.INFRACOST_DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          bash .github/scripts/notify-infracost.sh "prod" "15158332"
