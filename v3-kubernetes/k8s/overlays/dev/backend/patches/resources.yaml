apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: backend
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              # cpu: 500m  # dev: burst 허용으로 Spring Boot 시작 시간 단축
              memory: 768Mi
