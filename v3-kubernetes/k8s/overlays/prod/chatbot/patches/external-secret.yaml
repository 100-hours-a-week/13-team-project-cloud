apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: chatbot-secret
spec:
  dataFrom:
    - find:
        conversionStrategy: Default
        decodingStrategy: None
        path: /moyeobab/chatbot/prod/
        name:
          regexp: ".*"
      rewrite:
        - regexp:
            source: ".*/(.*)"
            target: "$1"
