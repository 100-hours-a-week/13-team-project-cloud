apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: recommend-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
  target:
    name: recommend-secret
  dataFrom:
    - find:
        path: MUST_BE_OVERRIDDEN_BY_OVERLAY
        name:
          regexp: ".*"
      rewrite:
        - regexp:
            source: ".*/(.*)"
            target: "$1"
