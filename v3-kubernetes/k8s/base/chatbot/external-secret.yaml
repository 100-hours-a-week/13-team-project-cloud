apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: chatbot-secret
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
  target:
    name: chatbot-secret
  dataFrom:
    - find:
        path: MUST_BE_OVERRIDDEN_BY_OVERLAY
        name:
          regexp: ".*"
      rewrite:
        - regexp:
            source: ".*/(.*)"
            target: "$1"
