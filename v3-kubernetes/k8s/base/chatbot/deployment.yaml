apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot
  labels:
    app: chatbot
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatbot
  template:
    metadata:
      labels:
        app: chatbot
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      containers:
        - name: chatbot
          image: moyeobab/chatbot
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: chatbot-config
            - secretRef:
                name: chatbot-secret
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 200m
              memory: 2Gi
            limits:
              cpu: 1000m
              memory: 3Gi
