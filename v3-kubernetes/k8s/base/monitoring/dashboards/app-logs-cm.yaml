apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-app-logs
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Logs"
data:
  app-logs.json: |
    {
      "panels": [
        {
          "title": "Log Volume",
          "type": "timeseries",
          "gridPos": {
            "h": 6,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "datasource": {
            "type": "loki",
            "uid": "P8E80F9AEF21F6940"
          },
          "targets": [
            {
              "expr": "{namespace=\"moyeobab\", app=\"$app\", pod=~\"$pod\"}",
              "refId": "A",
              "queryType": "range"
            }
          ]
        },
        {
          "title": "Logs",
          "type": "logs",
          "gridPos": {
            "h": 20,
            "w": 24,
            "x": 0,
            "y": 6
          },
          "datasource": {
            "type": "loki",
            "uid": "P8E80F9AEF21F6940"
          },
          "targets": [
            {
              "expr": "{namespace=\"moyeobab\", app=\"$app\", pod=~\"$pod\"}",
              "refId": "A",
              "queryType": "range"
            }
          ],
          "options": {
            "showTime": true,
            "sortOrder": "Descending",
            "enableLogDetails": true,
            "wrapLogMessage": true
          }
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "tags": [
        "app",
        "logs",
        "custom"
      ],
      "templating": {
        "list": [
          {
            "name": "app",
            "type": "query",
            "datasource": {
              "type": "loki",
              "uid": "P8E80F9AEF21F6940"
            },
            "query": "label_values({namespace=\"moyeobab\"}, app)",
            "refresh": 2,
            "current": {
              "text": "backend",
              "value": "backend"
            }
          },
          {
            "name": "pod",
            "type": "query",
            "datasource": {
              "type": "loki",
              "uid": "P8E80F9AEF21F6940"
            },
            "query": "label_values({namespace=\"moyeobab\", app=\"$app\"}, pod)",
            "refresh": 2,
            "includeAll": true,
            "current": {
              "text": "All",
              "value": "$__all"
            }
          }
        ]
      },
      "timezone": "browser",
      "title": "Application Logs - Moyeobab"
    }
