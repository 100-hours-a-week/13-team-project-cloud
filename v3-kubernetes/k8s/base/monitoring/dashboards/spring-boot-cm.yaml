apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-spring-boot
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Applications"
data:
  spring-boot.json: |
    {
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            }
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 0,
            "y": 0
          },
          "targets": [
            {
              "expr": "process_uptime_seconds{application=\"$application\", instance=~\"$instance\"}",
              "refId": "A"
            }
          ],
          "title": "Uptime",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "max": 100,
              "thresholds": {
                "steps": [
                  {
                    "color": "green",
                    "value": 0
                  },
                  {
                    "color": "yellow",
                    "value": 70
                  },
                  {
                    "color": "red",
                    "value": 85
                  }
                ]
              },
              "unit": "percent"
            }
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 4,
            "y": 0
          },
          "targets": [
            {
              "expr": "sum(jvm_memory_used_bytes{application=\"$application\", area=\"heap\"}) / sum(jvm_memory_max_bytes{application=\"$application\", area=\"heap\"}) * 100",
              "refId": "A"
            }
          ],
          "title": "Heap Used %",
          "type": "gauge"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent"
            }
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 8,
            "y": 0
          },
          "targets": [
            {
              "expr": "process_cpu_usage{application=\"$application\"} * 100",
              "refId": "A"
            }
          ],
          "title": "CPU Usage",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            }
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 12,
            "y": 0
          },
          "targets": [
            {
              "expr": "jvm_threads_live_threads{application=\"$application\"}",
              "refId": "A"
            }
          ],
          "title": "Threads",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 4
          },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{application=\"$application\"}[1m])) by (method, uri, status)",
              "legendFormat": "{{method}} {{uri}} [{{status}}]",
              "refId": "A"
            }
          ],
          "title": "HTTP RPS",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ms"
            }
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 4
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{application=\"$application\"}[1m])) by (le, uri)) * 1000",
              "legendFormat": "{{uri}}",
              "refId": "A"
            }
          ],
          "title": "HTTP P95 (ms)",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            }
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 12
          },
          "targets": [
            {
              "expr": "sum(jvm_memory_used_bytes{application=\"$application\", area=\"heap\"}) by (id)",
              "legendFormat": "{{id}}",
              "refId": "A"
            }
          ],
          "title": "JVM Heap Memory",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            }
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 12
          },
          "targets": [
            {
              "expr": "rate(jvm_gc_pause_seconds_sum{application=\"$application\"}[1m])",
              "legendFormat": "{{action}}",
              "refId": "A"
            }
          ],
          "title": "GC Pause",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 20
          },
          "targets": [
            {
              "expr": "hikaricp_connections_active{application=\"$application\"}",
              "legendFormat": "Active",
              "refId": "A"
            },
            {
              "expr": "hikaricp_connections_idle{application=\"$application\"}",
              "legendFormat": "Idle",
              "refId": "B"
            },
            {
              "expr": "hikaricp_connections_max{application=\"$application\"}",
              "legendFormat": "Max",
              "refId": "C"
            }
          ],
          "title": "HikariCP Connections",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 20
          },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{application=\"$application\", status=~\"5..\"}[1m])) by (uri)",
              "legendFormat": "{{uri}}",
              "refId": "A"
            }
          ],
          "title": "HTTP 5xx Errors",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 28
          },
          "targets": [
            {
              "expr": "rate(chat_message_persisted_total{application=\"$application\"}[1m])",
              "legendFormat": "{{type}}",
              "refId": "A"
            }
          ],
          "title": "Chat Messages",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": [
        "app",
        "spring-boot",
        "custom"
      ],
      "templating": {
        "list": [
          {
            "current": {
              "text": "matchimban-api",
              "value": "matchimban-api"
            },
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "name": "application",
            "query": "label_values(jvm_info, application)",
            "refresh": 2,
            "type": "query"
          },
          {
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "name": "instance",
            "query": "label_values(jvm_info{application=\"$application\"}, instance)",
            "refresh": 2,
            "type": "query"
          }
        ]
      },
      "timezone": "browser",
      "title": "Spring Boot - Moyeobab Backend"
    }
