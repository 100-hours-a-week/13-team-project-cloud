apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-mongodb
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Data Layer"
data:
  mongodb.json: |
    {
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  {
                    "color": "red",
                    "value": 0
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              },
              "unit": "short"
            }
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 0,
            "y": 0
          },
          "targets": [
            {
              "expr": "mongodb_up{job=\"prod-mongodb-exporter\"}",
              "refId": "A"
            }
          ],
          "title": "Up",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            }
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 4,
            "y": 0
          },
          "targets": [
            {
              "expr": "mongodb_ss_connections{job=\"prod-mongodb-exporter\",conn_type=\"current\"}",
              "refId": "A"
            }
          ],
          "title": "Connections",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            }
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 8,
            "y": 0
          },
          "targets": [
            {
              "expr": "mongodb_ss_connections{job=\"prod-mongodb-exporter\",conn_type=\"available\"}",
              "refId": "A"
            }
          ],
          "title": "Available Connections",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 4
          },
          "targets": [
            {
              "expr": "rate(mongodb_ss_opcounters{job=\"prod-mongodb-exporter\"}[1m])",
              "legendFormat": "{{legacy_op_type}}",
              "refId": "A"
            }
          ],
          "title": "Operations/sec",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 4
          },
          "targets": [
            {
              "expr": "rate(mongodb_ss_metrics_document{job=\"prod-mongodb-exporter\"}[1m])",
              "legendFormat": "{{doc_op_type}}",
              "refId": "A"
            }
          ],
          "title": "Document Operations/sec",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            }
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 12
          },
          "targets": [
            {
              "expr": "mongodb_ss_mem_resident{job=\"prod-mongodb-exporter\"}*1024*1024",
              "legendFormat": "Resident",
              "refId": "A"
            },
            {
              "expr": "mongodb_ss_mem_virtual{job=\"prod-mongodb-exporter\"}*1024*1024",
              "legendFormat": "Virtual",
              "refId": "B"
            }
          ],
          "title": "Memory",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            }
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 12
          },
          "targets": [
            {
              "expr": "mongodb_mongod_replset_member_replication_lag{job=\"prod-mongodb-exporter\"}",
              "legendFormat": "{{name}}",
              "refId": "A"
            }
          ],
          "title": "Replication Lag",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": [
        "data-layer",
        "mongodb",
        "custom"
      ],
      "templating": {
        "list": []
      },
      "timezone": "browser",
      "title": "MongoDB - Moyeobab"
    }
