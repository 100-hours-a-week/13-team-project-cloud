apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-rabbitmq
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Data Layer"
data:
  rabbitmq.json: |
    {
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  {
                    "color": "red",
                    "value": 0
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              },
              "unit": "short"
            }
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 0,
            "y": 0
          },
          "targets": [
            {
              "expr": "rabbitmq_identity_info{job=\"prod-rabbitmq\"}",
              "refId": "A"
            }
          ],
          "title": "Up",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            }
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 4,
            "y": 0
          },
          "targets": [
            {
              "expr": "rabbitmq_connections{job=\"prod-rabbitmq\"}",
              "refId": "A"
            }
          ],
          "title": "Connections",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            }
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 8,
            "y": 0
          },
          "targets": [
            {
              "expr": "rabbitmq_channels{job=\"prod-rabbitmq\"}",
              "refId": "A"
            }
          ],
          "title": "Channels",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            }
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 12,
            "y": 0
          },
          "targets": [
            {
              "expr": "rabbitmq_queues{job=\"prod-rabbitmq\"}",
              "refId": "A"
            }
          ],
          "title": "Queues",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            }
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 16,
            "y": 0
          },
          "targets": [
            {
              "expr": "sum(rabbitmq_queue_messages_ready{job=\"prod-rabbitmq\"})",
              "refId": "A"
            }
          ],
          "title": "Messages Ready",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  {
                    "color": "green",
                    "value": 0
                  },
                  {
                    "color": "yellow",
                    "value": 100
                  },
                  {
                    "color": "red",
                    "value": 1000
                  }
                ]
              },
              "unit": "short"
            }
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 20,
            "y": 0
          },
          "targets": [
            {
              "expr": "sum(rabbitmq_queue_messages_unacked{job=\"prod-rabbitmq\"})",
              "refId": "A"
            }
          ],
          "title": "Unacked",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 4
          },
          "targets": [
            {
              "expr": "rate(rabbitmq_channel_messages_published_total{job=\"prod-rabbitmq\"}[1m])",
              "legendFormat": "Published",
              "refId": "A"
            },
            {
              "expr": "rate(rabbitmq_channel_messages_delivered_total{job=\"prod-rabbitmq\"}[1m])",
              "legendFormat": "Delivered",
              "refId": "B"
            },
            {
              "expr": "rate(rabbitmq_channel_messages_acked_total{job=\"prod-rabbitmq\"}[1m])",
              "legendFormat": "Acked",
              "refId": "C"
            }
          ],
          "title": "Publish/Deliver Rate",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            }
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 4
          },
          "targets": [
            {
              "expr": "rabbitmq_process_resident_memory_bytes{job=\"prod-rabbitmq\"}",
              "legendFormat": "Used",
              "refId": "A"
            },
            {
              "expr": "rabbitmq_resident_memory_limit_bytes{job=\"prod-rabbitmq\"}",
              "legendFormat": "Limit",
              "refId": "B"
            }
          ],
          "title": "Memory Usage",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 12
          },
          "targets": [
            {
              "expr": "rabbitmq_queue_messages{job=\"prod-rabbitmq\"}",
              "legendFormat": "{{queue}}",
              "refId": "A"
            }
          ],
          "title": "Queue Depth",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 12
          },
          "targets": [
            {
              "expr": "rate(rabbitmq_connections_opened_total{job=\"prod-rabbitmq\"}[1m])",
              "legendFormat": "Opened",
              "refId": "A"
            },
            {
              "expr": "rate(rabbitmq_connections_closed_total{job=\"prod-rabbitmq\"}[1m])",
              "legendFormat": "Closed",
              "refId": "B"
            }
          ],
          "title": "Connection Churn",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": [
        "data-layer",
        "rabbitmq",
        "custom"
      ],
      "templating": {
        "list": []
      },
      "timezone": "browser",
      "title": "RabbitMQ - Moyeobab"
    }
