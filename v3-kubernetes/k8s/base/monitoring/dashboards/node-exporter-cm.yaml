apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-node-exporter
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Data Layer"
data:
  node-exporter.json: |
    {
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "max": 100,
              "unit": "percent"
            }
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "targets": [
            {
              "expr": "100-(avg by(instance)(rate(node_cpu_seconds_total{job=\"prod-data-node-exporter\",mode=\"idle\"}[5m]))*100)",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "title": "CPU Usage %",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "max": 100,
              "unit": "percent"
            }
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "targets": [
            {
              "expr": "(1-node_memory_MemAvailable_bytes{job=\"prod-data-node-exporter\"}/node_memory_MemTotal_bytes{job=\"prod-data-node-exporter\"})*100",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "title": "Memory Usage %",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "max": 100,
              "unit": "percent"
            }
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "targets": [
            {
              "expr": "(1-node_filesystem_avail_bytes{job=\"prod-data-node-exporter\",mountpoint=\"/\"}/node_filesystem_size_bytes{job=\"prod-data-node-exporter\",mountpoint=\"/\"})*100",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "title": "Disk Usage %",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps"
            }
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "targets": [
            {
              "expr": "rate(node_network_receive_bytes_total{job=\"prod-data-node-exporter\",device!~\"lo|veth.*|docker.*|br.*\"}[1m])",
              "legendFormat": "In {{instance}}",
              "refId": "A"
            },
            {
              "expr": "rate(node_network_transmit_bytes_total{job=\"prod-data-node-exporter\",device!~\"lo|veth.*|docker.*|br.*\"}[1m])",
              "legendFormat": "Out {{instance}}",
              "refId": "B"
            }
          ],
          "title": "Network I/O",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": [
        "data-layer",
        "node-exporter",
        "custom"
      ],
      "templating": {
        "list": [
          {
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "name": "instance",
            "query": "label_values(node_uname_info{job=\"prod-data-node-exporter\"}, instance)",
            "refresh": 2,
            "type": "query"
          }
        ]
      },
      "timezone": "browser",
      "title": "Data Layer Nodes - Moyeobab"
    }
