apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-redis
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Data Layer"
data:
  redis.json: |
    {
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            }
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 0,
            "y": 0
          },
          "targets": [
            {
              "expr": "redis_uptime_in_seconds{job=\"prod-redis-exporter\",instance=~\"$instance\"}",
              "refId": "A"
            }
          ],
          "title": "Uptime",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            }
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 4,
            "y": 0
          },
          "targets": [
            {
              "expr": "redis_connected_clients{job=\"prod-redis-exporter\",instance=~\"$instance\"}",
              "refId": "A"
            }
          ],
          "title": "Connected Clients",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "max": 100,
              "thresholds": {
                "steps": [
                  {
                    "color": "green",
                    "value": 0
                  },
                  {
                    "color": "yellow",
                    "value": 70
                  },
                  {
                    "color": "red",
                    "value": 85
                  }
                ]
              },
              "unit": "percent"
            }
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 8,
            "y": 0
          },
          "targets": [
            {
              "expr": "redis_memory_used_bytes{job=\"prod-redis-exporter\",instance=~\"$instance\"} / redis_memory_max_bytes{job=\"prod-redis-exporter\",instance=~\"$instance\"} * 100",
              "refId": "A"
            }
          ],
          "title": "Memory Used %",
          "type": "gauge"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops"
            }
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 12,
            "y": 0
          },
          "targets": [
            {
              "expr": "rate(redis_commands_processed_total{job=\"prod-redis-exporter\",instance=~\"$instance\"}[1m])",
              "refId": "A"
            }
          ],
          "title": "Ops/sec",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent"
            }
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 16,
            "y": 0
          },
          "targets": [
            {
              "expr": "rate(redis_keyspace_hits_total{job=\"prod-redis-exporter\",instance=~\"$instance\"}[5m]) / (rate(redis_keyspace_hits_total{job=\"prod-redis-exporter\",instance=~\"$instance\"}[5m]) + rate(redis_keyspace_misses_total{job=\"prod-redis-exporter\",instance=~\"$instance\"}[5m])) * 100",
              "refId": "A"
            }
          ],
          "title": "Hit Rate %",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            }
          },
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 20,
            "y": 0
          },
          "targets": [
            {
              "expr": "sum(redis_db_keys{job=\"prod-redis-exporter\",instance=~\"$instance\"})",
              "refId": "A"
            }
          ],
          "title": "Keys",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            }
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 4
          },
          "targets": [
            {
              "expr": "redis_memory_used_bytes{job=\"prod-redis-exporter\"}",
              "legendFormat": "Used {{instance}}",
              "refId": "A"
            },
            {
              "expr": "redis_memory_max_bytes{job=\"prod-redis-exporter\"}",
              "legendFormat": "Max {{instance}}",
              "refId": "B"
            }
          ],
          "title": "Memory Usage",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 4
          },
          "targets": [
            {
              "expr": "rate(redis_commands_processed_total{job=\"prod-redis-exporter\"}[1m])",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "title": "Commands/sec",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 12
          },
          "targets": [
            {
              "expr": "redis_connected_clients{job=\"prod-redis-exporter\"}",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "title": "Connected Clients",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps"
            }
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 12
          },
          "targets": [
            {
              "expr": "rate(redis_net_input_bytes_total{job=\"prod-redis-exporter\"}[1m])",
              "legendFormat": "In {{instance}}",
              "refId": "A"
            },
            {
              "expr": "rate(redis_net_output_bytes_total{job=\"prod-redis-exporter\"}[1m])",
              "legendFormat": "Out {{instance}}",
              "refId": "B"
            }
          ],
          "title": "Network I/O",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": [
        "data-layer",
        "redis",
        "custom"
      ],
      "templating": {
        "list": [
          {
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "name": "instance",
            "query": "label_values(redis_uptime_in_seconds{job=\"prod-redis-exporter\"}, instance)",
            "refresh": 2,
            "type": "query"
          }
        ]
      },
      "timezone": "browser",
      "title": "Redis - Moyeobab"
    }
