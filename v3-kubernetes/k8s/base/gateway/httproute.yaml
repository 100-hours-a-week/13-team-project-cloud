apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: moyeobab-routes
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  rules:
    # recommend는 ClusterIP로 내부 통신만 (외부 노출 불필요)
    # /actuator/prometheus, /swagger-ui, /v3/api-docs 등은 라우팅 없음 → 404
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: backend
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /actuator/health
      backendRefs:
        - name: backend
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /stomp
      backendRefs:
        - name: backend
          port: 8080
