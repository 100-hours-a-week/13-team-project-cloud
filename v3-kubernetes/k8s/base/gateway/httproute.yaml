apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: moyeobab-routes
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  rules:
    # /api/v2/ws → backend WebSocket (recommend보다 먼저 매칭)
    - matches:
        - path:
            type: PathPrefix
            value: /api/v2/ws
      backendRefs:
        - name: backend
          port: 8080
    # /api/v2 → recommend 서비스
    - matches:
        - path:
            type: PathPrefix
            value: /api/v2
      backendRefs:
        - name: recommend
          port: 8000
    # 나머지 → backend 서비스
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: backend
          port: 8080
