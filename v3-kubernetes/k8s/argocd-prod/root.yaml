# App of Apps (prod) — 이 파일만 수동 kubectl apply (최초 1회)
# 이후 argocd-prod/ 폴더에 yaml 추가하면 자동 등록
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:100-hours-a-week/13-team-project-cloud.git
    path: v3-kubernetes/k8s/argocd-prod
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
