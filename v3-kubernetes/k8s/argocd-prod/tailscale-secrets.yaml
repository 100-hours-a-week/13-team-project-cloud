apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tailscale-secrets-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:100-hours-a-week/13-team-project-cloud.git
    path: v3-kubernetes/k8s/overlays/prod/tailscale-secrets
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: tailscale-system
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
