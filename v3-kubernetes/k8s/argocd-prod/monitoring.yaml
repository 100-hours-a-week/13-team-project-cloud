apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "*"
    helm:
      valuesObject:
        # ===== Grafana =====
        grafana:
          admin:
            existingSecret: monitoring-secrets # pragma: allowlist secret
            userKey: GRAFANA_ADMIN_USER # pragma: allowlist secret
            passwordKey: GRAFANA_ADMIN_PASSWORD # pragma: allowlist secret
          service:
            annotations:
              tailscale.com/expose: "true"
              tailscale.com/hostname: "grafana"
          additionalDataSources:
            - name: Loki
              type: loki
              url: http://loki.monitoring.svc.cluster.local:3100
              access: proxy
              isDefault: false
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi

        # ===== Prometheus =====
        prometheus:
          prometheusSpec:
            secrets: ['monitoring-secrets']
            retention: 15d
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                cpu: 500m
                memory: 1Gi
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: ebs-gp3
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 30Gi
            # ŪĀīŽü¨žä§ŪĄį Žāī Ž™®Žď† ServiceMonitor/PodMonitor žąėžßĎ
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            # EC2 Data Layer exporter žä§ŪĀ¨Žě© (ŪÉúÍ∑ł ÍłįŽįė žĄúŽĻĄžä§ ŽĒĒžä§žĽ§Ž≤ĄŽ¶¨)
            additionalScrapeConfigs:
              - job_name: 'prod-postgres-exporter'
                ec2_sd_configs:
                  - region: ap-northeast-2
                    port: 9187
                    filters:
                      - name: tag:Project
                        values: [moyeobab]
                      - name: tag:Environment
                        values: [prod]
                      - name: tag:Service
                        values: [postgresql]
                      - name: instance-state-name
                        values: [running]
                relabel_configs:
                  - source_labels: [__meta_ec2_tag_Name]
                    regex: '.*-(primary|standby)$'
                    target_label: role
                  - source_labels: [__meta_ec2_tag_Name]
                    target_label: instance
                  - source_labels: [__meta_ec2_private_ip]
                    target_label: private_ip
              - job_name: 'prod-redis-exporter'
                ec2_sd_configs:
                  - region: ap-northeast-2
                    port: 9121
                    filters:
                      - name: tag:Project
                        values: [moyeobab]
                      - name: tag:Environment
                        values: [prod]
                      - name: tag:Service
                        values: [redis]
                      - name: instance-state-name
                        values: [running]
                relabel_configs:
                  - source_labels: [__meta_ec2_tag_Name]
                    regex: '.*-(primary|standby)$'
                    target_label: role
                  - source_labels: [__meta_ec2_tag_Name]
                    target_label: instance
                  - source_labels: [__meta_ec2_private_ip]
                    target_label: private_ip
              - job_name: 'prod-data-node-exporter'
                ec2_sd_configs:
                  - region: ap-northeast-2
                    port: 9100
                    filters:
                      - name: tag:Project
                        values: [moyeobab]
                      - name: tag:Environment
                        values: [prod]
                      - name: tag:Tier
                        values: [data]
                      - name: instance-state-name
                        values: [running]
                relabel_configs:
                  - source_labels: [__meta_ec2_tag_Name]
                    target_label: instance
                  - source_labels: [__meta_ec2_tag_Service]
                    target_label: service
                  - source_labels: [__meta_ec2_private_ip]
                    target_label: private_ip
              - job_name: 'prod-qdrant'
                ec2_sd_configs:
                  - region: ap-northeast-2
                    port: 6333
                    filters:
                      - name: tag:Project
                        values: [moyeobab]
                      - name: tag:Environment
                        values: [prod]
                      - name: tag:Service
                        values: [qdrant]
                      - name: instance-state-name
                        values: [running]
                metrics_path: /metrics
                authorization:
                  credentials_file: /etc/prometheus/secrets/monitoring-secrets/QDRANT_API_KEY
                relabel_configs:
                  - source_labels: [__meta_ec2_tag_Name]
                    target_label: instance
                  - source_labels: [__meta_ec2_private_ip]
                    target_label: private_ip

        # ===== AlertManager =====
        alertmanager:
          alertmanagerSpec:
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 128Mi
            # ExternalSecretžúľŽ°ú žÉĚžĄĪŽźú SecretžĚĄ Podžóź ŽßąžöīŪäł
            secrets: ['monitoring-secrets']
          config:
            global:
              resolve_timeout: 5m
            route:
              group_by: ['alertname', 'job']
              group_wait: 15s
              group_interval: 5m
              repeat_interval: 1h
              receiver: 'warning'
              routes:
                - match:
                    alertname: Watchdog
                  receiver: 'null'
                - match:
                    severity: critical
                  receiver: 'critical'
            receivers:
              - name: 'null'
              - name: 'critical'
                discord_configs:
                  - webhook_url_file: '/etc/alertmanager/secrets/monitoring-secrets/DISCORD_WEBHOOK_CRITICAL' # pragma: allowlist secret
                    send_resolved: true
                    title: '{{ if eq .Status "firing" }}ūüö® [CRITICAL] {{ else }}‚úÖ [RESOLVED] {{ end }}{{ .GroupLabels.alertname }}'
                    content: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}{{ end }}"
              - name: 'warning'
                discord_configs:
                  - webhook_url_file: '/etc/alertmanager/secrets/monitoring-secrets/DISCORD_WEBHOOK_WARNING' # pragma: allowlist secret
                    send_resolved: true
                    title: '{{ if eq .Status "firing" }}‚ö†ÔłŹ [WARNING] {{ else }}‚úÖ [RESOLVED] {{ end }}{{ .GroupLabels.alertname }}'
                    content: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}{{ end }}"

        # ===== Alert Rules =====
        additionalPrometheusRulesMap:
          moyeobab-alerts:
            groups:
              # --- ÍįÄžö©žĄĪ ---
              - name: availability
                rules:
                  - alert: InstanceDown
                    expr: up == 0
                    for: 1m
                    labels:
                      severity: critical
                    annotations:
                      summary: "žĚłžä§ŪĄīžä§ Žč§žöī ({{ $labels.instance }})"
                      description: "{{ $labels.job }} žĚłžä§ŪĄīžä§ÍįÄ 1Ž∂Ą žĚīžÉĀ žĚĎŽčĶŪēėžßÄ žēäžäĶŽčąŽč§."

                  - alert: RedisDown
                    expr: redis_up == 0
                    for: 1m
                    labels:
                      severity: critical
                    annotations:
                      summary: "Redis Žč§žöī"
                      description: "Redis žĚłžä§ŪĄīžä§ÍįÄ žĚĎŽčĶŪēėžßÄ žēäžäĶŽčąŽč§. ž¶Čžčú ŪôēžĚł ŪēĄžöĒ."

                  - alert: PostgreSQLDown
                    expr: pg_up == 0
                    for: 1m
                    labels:
                      severity: critical
                    annotations:
                      summary: "PostgreSQL Žč§žöī"
                      description: "PostgreSQL žĚłžä§ŪĄīžä§ÍįÄ žĚĎŽčĶŪēėžßÄ žēäžäĶŽčąŽč§. ž¶Čžčú ŪôēžĚł ŪēĄžöĒ."

              # --- žĄĪŽä• (Spring Boot 3 Micrometer Ž©ĒŪäłŽ¶≠ Íłįž§Ä) ---
              - name: performance
                rules:
                  - alert: HighResponseTime
                    expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket{namespace="moyeobab"}[5m])) > 0.5
                    for: 1m
                    labels:
                      severity: warning
                    annotations:
                      summary: "API žĚĎŽčĶ žßÄžóį ({{ $labels.instance }})"
                      description: "P95 žĚĎŽčĶžčúÍįĄžĚī {{ $value | printf \"%.2f\" }}žīą žěÖŽčąŽč§."

                  - alert: CriticalResponseTime
                    expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket{namespace="moyeobab"}[5m])) > 2
                    for: 1m
                    labels:
                      severity: critical
                    annotations:
                      summary: "API žĚĎŽčĶ žč¨ÍįĀŪēú žßÄžóį ({{ $labels.instance }})"
                      description: "P95 žĚĎŽčĶžčúÍįĄžĚī {{ $value | printf \"%.2f\" }}žīą žěÖŽčąŽč§. ž¶Čžčú ŪôēžĚł ŪēĄžöĒ."

              # --- žóźŽü¨žú® (Spring Boot 3 Micrometer Ž©ĒŪäłŽ¶≠ Íłįž§Ä) ---
              - name: error_rate
                rules:
                  - alert: HighErrorRate
                    expr: rate(http_server_requests_seconds_count{namespace="moyeobab", status=~"5.."}[5m]) / rate(http_server_requests_seconds_count{namespace="moyeobab"}[5m]) * 100 > 1
                    for: 3m
                    labels:
                      severity: warning
                    annotations:
                      summary: "5xx žóźŽü¨žú® ŽÜížĚĆ"
                      description: "žóźŽü¨žú®žĚī {{ $value | printf \"%.1f\" }}% žěÖŽčąŽč§."

                  - alert: CriticalErrorRate
                    expr: rate(http_server_requests_seconds_count{namespace="moyeobab", status=~"5.."}[5m]) / rate(http_server_requests_seconds_count{namespace="moyeobab"}[5m]) * 100 > 5
                    for: 2m
                    labels:
                      severity: critical
                    annotations:
                      summary: "5xx žóźŽü¨žú® žč¨ÍįĀ"
                      description: "žóźŽü¨žú®žĚī {{ $value | printf \"%.1f\" }}% žěÖŽčąŽč§. Ž°§ŽįĪ Í≤ÄŪÜ† ŪēĄžöĒ."

              # --- Ūíąžßą ---
              - name: quality
                rules:
                  - alert: EmptyRecommendResult
                    expr: increase(recommend_empty_result_total{namespace="moyeobab"}[5m]) > 10
                    for: 5m
                    labels:
                      severity: warning
                    annotations:
                      summary: "ž∂Ēž≤ú Í≤įÍ≥ľ ŽĻą žĚĎŽčĶ ž¶ĚÍįÄ"
                      description: "5Ž∂ĄÍįĄ ŽĻą ž∂Ēž≤ú Í≤įÍ≥ľÍįÄ {{ $value }}ÍĪī ŽįúžÉĚŪĖąžäĶŽčąŽč§."

              # --- Ž¶¨žÜĆžä§ (node-exporter Ž©ĒŪäłŽ¶≠) ---
              - name: resource
                rules:
                  - alert: HighCPUUsage
                    expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
                    for: 5m
                    labels:
                      severity: warning
                    annotations:
                      summary: "CPU žā¨žö©Ž•† ŽÜížĚĆ ({{ $labels.instance }})"
                      description: "CPU žā¨žö©Ž•†žĚī {{ $value | printf \"%.1f\" }}% žěÖŽčąŽč§."

                  - alert: HighMemoryUsage
                    expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
                    for: 5m
                    labels:
                      severity: warning
                    annotations:
                      summary: "Ž©ĒŽ™®Ž¶¨ žā¨žö©Ž•† ŽÜížĚĆ ({{ $labels.instance }})"
                      description: "Ž©ĒŽ™®Ž¶¨ žā¨žö©Ž•†žĚī {{ $value | printf \"%.1f\" }}% žěÖŽčąŽč§."

                  - alert: HighDiskUsage
                    expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100 > 85
                    for: 5m
                    labels:
                      severity: critical
                    annotations:
                      summary: "ŽĒĒžä§ŪĀ¨ žā¨žö©Ž•† ŽÜížĚĆ ({{ $labels.instance }})"
                      description: "ŽĒĒžä§ŪĀ¨ žā¨žö©Ž•†žĚī {{ $value | printf \"%.1f\" }}% žěÖŽčąŽč§. Ž°úÍ∑ł ž†ēŽ¶¨ ŪēĄžöĒ."

                  - alert: PostgreSQLHighConnections
                    expr: sum(pg_stat_activity_count) / pg_settings_max_connections * 100 > 80
                    for: 5m
                    labels:
                      severity: critical
                    annotations:
                      summary: "PostgreSQL žĽ§ŽĄ•žÖė ŪíÄ Í≥†Íįą žúĄŪóė"
                      description: "žĽ§ŽĄ•žÖė žā¨žö©Ž•†žĚī {{ $value | printf \"%.1f\" }}% žěÖŽčąŽč§. žĽ§ŽĄ•žÖė ŽąĄžąė ŪôēžĚł ŪēĄžöĒ."

                  - alert: RedisHighMemory
                    expr: redis_memory_used_bytes / redis_memory_max_bytes * 100 > 85
                    for: 5m
                    labels:
                      severity: warning
                    annotations:
                      summary: "Redis Ž©ĒŽ™®Ž¶¨ žā¨žö©Ž•† ŽÜížĚĆ"
                      description: "Redis Ž©ĒŽ™®Ž¶¨ žā¨žö©Ž•†žĚī {{ $value | printf \"%.1f\" }}% žěÖŽčąŽč§."

        # ===== kubeadm ŪôėÍ≤Ĺ ‚ÄĒ CP žĽīŪŹ¨ŽĄĆŪäł žä§ŪĀ¨Žě© Ž∂ąÍįÄ =====
        kubeEtcd:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeControllerManager:
          enabled: false
        kubeProxy:
          enabled: false

        # ===== ŽÖłŽďú/ŪĀīŽü¨žä§ŪĄį Ž©ĒŪäłŽ¶≠ =====
        nodeExporter:
          enabled: true
        kube-state-metrics:
          enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
