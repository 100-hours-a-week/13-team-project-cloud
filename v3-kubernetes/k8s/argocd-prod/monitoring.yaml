apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "*"
    helm:
      valuesObject:
        # ===== Grafana =====
        grafana:
          admin:
            existingSecret: monitoring-secrets # pragma: allowlist secret
            userKey: GRAFANA_ADMIN_USER # pragma: allowlist secret
            passwordKey: GRAFANA_ADMIN_PASSWORD # pragma: allowlist secret
          service:
            annotations:
              tailscale.com/expose: "true"
              tailscale.com/hostname: "grafana"
          additionalDataSources:
            - name: Loki
              type: loki
              url: http://loki.monitoring.svc.cluster.local:3100
              access: proxy
              isDefault: false
          # 대시보드는 ConfigMap + sidecar 방식으로 프로비저닝
          # (base/monitoring/dashboards/*-cm.yaml, label: grafana_dashboard=1)
          sidecar:
            dashboards:
              enabled: true
              folderAnnotation: grafana_folder
              provider:
                foldersFromFilesStructure: false
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi

        # ===== Prometheus =====
        prometheus:
          prometheusSpec:
            secrets: ['monitoring-secrets']
            retention: 15d
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                cpu: 500m
                memory: 1Gi
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: ebs-gp3
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 30Gi
            # 클러스터 내 모든 ServiceMonitor/PodMonitor 수집
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            # EC2 Data Layer exporter 스크랩 (태그 기반 서비스 디스커버리)
            additionalScrapeConfigs:
              - job_name: 'prod-postgres-exporter'
                ec2_sd_configs:
                  - region: ap-northeast-2
                    port: 9187
                    filters:
                      - name: tag:Project
                        values: [moyeobab]
                      - name: tag:Environment
                        values: [prod]
                      - name: tag:Service
                        values: [postgresql]
                      - name: instance-state-name
                        values: [running]
                relabel_configs:
                  - source_labels: [__meta_ec2_tag_Name]
                    regex: '.*-(primary|standby)$'
                    target_label: role
                  - source_labels: [__meta_ec2_tag_Name]
                    target_label: instance
                  - source_labels: [__meta_ec2_private_ip]
                    target_label: private_ip
              - job_name: 'prod-redis-exporter'
                ec2_sd_configs:
                  - region: ap-northeast-2
                    port: 9121
                    filters:
                      - name: tag:Project
                        values: [moyeobab]
                      - name: tag:Environment
                        values: [prod]
                      - name: tag:Service
                        values: [redis]
                      - name: instance-state-name
                        values: [running]
                relabel_configs:
                  - source_labels: [__meta_ec2_tag_Name]
                    regex: '.*-(primary|standby)$'
                    target_label: role
                  - source_labels: [__meta_ec2_tag_Name]
                    target_label: instance
                  - source_labels: [__meta_ec2_private_ip]
                    target_label: private_ip
              - job_name: 'prod-data-node-exporter'
                ec2_sd_configs:
                  - region: ap-northeast-2
                    port: 9100
                    filters:
                      - name: tag:Project
                        values: [moyeobab]
                      - name: tag:Environment
                        values: [prod]
                      - name: tag:Tier
                        values: [data]
                      - name: instance-state-name
                        values: [running]
                relabel_configs:
                  - source_labels: [__meta_ec2_tag_Name]
                    target_label: instance
                  - source_labels: [__meta_ec2_tag_Service]
                    target_label: service
                  - source_labels: [__meta_ec2_private_ip]
                    target_label: private_ip
              - job_name: 'prod-qdrant'
                ec2_sd_configs:
                  - region: ap-northeast-2
                    port: 6333
                    filters:
                      - name: tag:Project
                        values: [moyeobab]
                      - name: tag:Environment
                        values: [prod]
                      - name: tag:Service
                        values: [qdrant]
                      - name: instance-state-name
                        values: [running]
                metrics_path: /metrics
                authorization:
                  credentials_file: /etc/prometheus/secrets/monitoring-secrets/QDRANT_API_KEY
                relabel_configs:
                  - source_labels: [__meta_ec2_tag_Name]
                    target_label: instance
                  - source_labels: [__meta_ec2_private_ip]
                    target_label: private_ip

        # ===== AlertManager =====
        alertmanager:
          alertmanagerSpec:
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 128Mi
            # ExternalSecret으로 생성된 Secret을 Pod에 마운트
            secrets: ['monitoring-secrets']
          tplConfig: true
          config:
            global:
              resolve_timeout: 5m
            route:
              group_by: ['alertname', 'job']
              group_wait: 15s
              group_interval: 5m
              repeat_interval: 1h
              receiver: 'warning'
              routes:
                - match:
                    alertname: Watchdog
                  receiver: 'null'
                - match:
                    severity: critical
                  receiver: 'critical'
            receivers:
              - name: 'null'
              - name: 'critical'
                discord_configs:
                  - webhook_url: '{{ readFile "/etc/alertmanager/secrets/monitoring-secrets/DISCORD_WEBHOOK_CRITICAL" }}' # pragma: allowlist secret
                    send_resolved: true
                    title: '{{ if eq .Status "firing" }}🚨 [CRITICAL] {{ else }}✅ [RESOLVED] {{ end }}{{ .GroupLabels.alertname }}'
                    content: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}{{ end }}"
              - name: 'warning'
                discord_configs:
                  - webhook_url: '{{ readFile "/etc/alertmanager/secrets/monitoring-secrets/DISCORD_WEBHOOK_WARNING" }}' # pragma: allowlist secret
                    send_resolved: true
                    title: '{{ if eq .Status "firing" }}⚠️ [WARNING] {{ else }}✅ [RESOLVED] {{ end }}{{ .GroupLabels.alertname }}'
                    content: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}{{ end }}"

        # ===== Alert Rules =====
        additionalPrometheusRulesMap:
          moyeobab-alerts:
            groups:
              # --- 가용성 ---
              - name: availability
                rules:
                  - alert: InstanceDown
                    expr: up == 0
                    for: 1m
                    labels:
                      severity: critical
                    annotations:
                      summary: "인스턴스 다운 ({{ $labels.instance }})"
                      description: "{{ $labels.job }} 인스턴스가 1분 이상 응답하지 않습니다."

                  - alert: RedisDown
                    expr: redis_up == 0
                    for: 1m
                    labels:
                      severity: critical
                    annotations:
                      summary: "Redis 다운"
                      description: "Redis 인스턴스가 응답하지 않습니다. 즉시 확인 필요."

                  - alert: PostgreSQLDown
                    expr: pg_up == 0
                    for: 1m
                    labels:
                      severity: critical
                    annotations:
                      summary: "PostgreSQL 다운"
                      description: "PostgreSQL 인스턴스가 응답하지 않습니다. 즉시 확인 필요."

              # --- 성능 (Spring Boot 3 Micrometer 메트릭 기준) ---
              - name: performance
                rules:
                  - alert: HighResponseTime
                    expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket{namespace="moyeobab"}[5m])) > 0.5
                    for: 1m
                    labels:
                      severity: warning
                    annotations:
                      summary: "API 응답 지연 ({{ $labels.instance }})"
                      description: "P95 응답시간이 {{ $value | printf \"%.2f\" }}초 입니다."

                  - alert: CriticalResponseTime
                    expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket{namespace="moyeobab"}[5m])) > 2
                    for: 1m
                    labels:
                      severity: critical
                    annotations:
                      summary: "API 응답 심각한 지연 ({{ $labels.instance }})"
                      description: "P95 응답시간이 {{ $value | printf \"%.2f\" }}초 입니다. 즉시 확인 필요."

              # --- 에러율 (Spring Boot 3 Micrometer 메트릭 기준) ---
              - name: error_rate
                rules:
                  - alert: HighErrorRate
                    expr: rate(http_server_requests_seconds_count{namespace="moyeobab", status=~"5.."}[5m]) / rate(http_server_requests_seconds_count{namespace="moyeobab"}[5m]) * 100 > 1
                    for: 3m
                    labels:
                      severity: warning
                    annotations:
                      summary: "5xx 에러율 높음"
                      description: "에러율이 {{ $value | printf \"%.1f\" }}% 입니다."

                  - alert: CriticalErrorRate
                    expr: rate(http_server_requests_seconds_count{namespace="moyeobab", status=~"5.."}[5m]) / rate(http_server_requests_seconds_count{namespace="moyeobab"}[5m]) * 100 > 5
                    for: 2m
                    labels:
                      severity: critical
                    annotations:
                      summary: "5xx 에러율 심각"
                      description: "에러율이 {{ $value | printf \"%.1f\" }}% 입니다. 롤백 검토 필요."

              # --- 품질 ---
              - name: quality
                rules:
                  - alert: EmptyRecommendResult
                    expr: increase(recommend_empty_result_total{namespace="moyeobab"}[5m]) > 10
                    for: 5m
                    labels:
                      severity: warning
                    annotations:
                      summary: "추천 결과 빈 응답 증가"
                      description: "5분간 빈 추천 결과가 {{ $value }}건 발생했습니다."

              # --- 리소스 (node-exporter 메트릭) ---
              - name: resource
                rules:
                  - alert: HighCPUUsage
                    expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
                    for: 5m
                    labels:
                      severity: warning
                    annotations:
                      summary: "CPU 사용률 높음 ({{ $labels.instance }})"
                      description: "CPU 사용률이 {{ $value | printf \"%.1f\" }}% 입니다."

                  - alert: HighMemoryUsage
                    expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
                    for: 5m
                    labels:
                      severity: warning
                    annotations:
                      summary: "메모리 사용률 높음 ({{ $labels.instance }})"
                      description: "메모리 사용률이 {{ $value | printf \"%.1f\" }}% 입니다."

                  - alert: HighDiskUsage
                    expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100 > 85
                    for: 5m
                    labels:
                      severity: critical
                    annotations:
                      summary: "디스크 사용률 높음 ({{ $labels.instance }})"
                      description: "디스크 사용률이 {{ $value | printf \"%.1f\" }}% 입니다. 로그 정리 필요."

                  - alert: PostgreSQLHighConnections
                    expr: sum(pg_stat_activity_count) / pg_settings_max_connections * 100 > 80
                    for: 5m
                    labels:
                      severity: critical
                    annotations:
                      summary: "PostgreSQL 커넥션 풀 고갈 위험"
                      description: "커넥션 사용률이 {{ $value | printf \"%.1f\" }}% 입니다. 커넥션 누수 확인 필요."

                  - alert: RedisHighMemory
                    expr: redis_memory_used_bytes / redis_memory_max_bytes * 100 > 85
                    for: 5m
                    labels:
                      severity: warning
                    annotations:
                      summary: "Redis 메모리 사용률 높음"
                      description: "Redis 메모리 사용률이 {{ $value | printf \"%.1f\" }}% 입니다."

        # ===== kubeadm 환경 — CP 컴포넌트 스크랩 불가 =====
        kubeEtcd:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeControllerManager:
          enabled: false
        kubeProxy:
          enabled: false

        # ===== 노드/클러스터 메트릭 =====
        nodeExporter:
          enabled: true
        kube-state-metrics:
          enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
