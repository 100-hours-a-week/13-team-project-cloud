global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']

  # ===== v1 static =====
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['10.1.0.150:9100']

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['10.1.0.150:9121']

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['10.1.0.150:9187']

  - job_name: 'nginx-exporter'
    static_configs:
      - targets: ['10.1.0.150:9113']

  - job_name: 'backend-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['10.1.0.150:8080']

  - job_name: 'ai-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['10.1.0.150:8000']

  # ===== v2 EC2 Service Discovery =====
  - job_name: 'node-exporter-v2'
    ec2_sd_configs:
      - region: ap-northeast-2
        port: 9100
        filters:
          - name: "tag:Version"
            values: ["v2"]
          - name: "tag:ManagedBy"
            values: ["terraform"]
    relabel_configs:
      - source_labels: [__meta_ec2_instance_state]
        regex: running
        action: keep
      - source_labels: [__meta_ec2_tag_Name]
        target_label: instance
      - source_labels: [__meta_ec2_tag_Service]
        target_label: service
      - source_labels: [__meta_ec2_tag_Tier]
        target_label: tier

  - job_name: 'backend-service-v2'
    metrics_path: '/actuator/prometheus'
    ec2_sd_configs:
      - region: ap-northeast-2
        port: 8080
        filters:
          - name: "tag:Version"
            values: ["v2"]
          - name: "tag:Service"
            values: ["backend"]
    relabel_configs:
      - source_labels: [__meta_ec2_instance_state]
        regex: running
        action: keep
      - source_labels: [__meta_ec2_tag_Name]
        target_label: instance
      - source_labels: [__meta_ec2_tag_Service]
        target_label: service

  - job_name: 'recommend-service-v2'
    metrics_path: '/metrics'
    ec2_sd_configs:
      - region: ap-northeast-2
        port: 8000
        filters:
          - name: "tag:Version"
            values: ["v2"]
          - name: "tag:Service"
            values: ["recommend"]
    relabel_configs:
      - source_labels: [__meta_ec2_instance_state]
        regex: running
        action: keep
      - source_labels: [__meta_ec2_tag_Name]
        target_label: instance
      - source_labels: [__meta_ec2_tag_Service]
        target_label: service

  - job_name: 'postgres-exporter-v2'
    ec2_sd_configs:
      - region: ap-northeast-2
        port: 9187
        filters:
          - name: "tag:Version"
            values: ["v2"]
          - name: "tag:Service"
            values: ["postgresql"]
    relabel_configs:
      - source_labels: [__meta_ec2_instance_state]
        regex: running
        action: keep
      - source_labels: [__meta_ec2_tag_Name]
        target_label: instance
      - source_labels: [__meta_ec2_tag_Service]
        target_label: service

  - job_name: 'redis-exporter-v2'
    ec2_sd_configs:
      - region: ap-northeast-2
        port: 9121
        filters:
          - name: "tag:Version"
            values: ["v2"]
          - name: "tag:Service"
            values: ["redis"]
    relabel_configs:
      - source_labels: [__meta_ec2_instance_state]
        regex: running
        action: keep
      - source_labels: [__meta_ec2_tag_Name]
        target_label: instance
      - source_labels: [__meta_ec2_tag_Service]
        target_label: service
